<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Disability Job Form</title>
  
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      height: 98vh;
      background: url('imagee/i (1).jpeg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      display: flex;
      padding-top: 6px;
    }

  <link rel="stylesheet" href="stylee/Home.css">
  <style>
    /* طبقة shadow فوق الصورة */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 150%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    form {
      position: relative;
      z-index: 1;
      background-color: #ffffff;
      padding: 31px 48px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
      font-size: 24px;
    }

    label {
      text-align: left;
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #444;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      font-size: 15px;
      background-color: #f7f7f7;
      transition: border-color 0.3s ease;
    }

    select:focus {
      border-color: rgb(57, 206, 209);
      outline: none;
    }

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background-color: rgb(57, 206, 209);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    input[type="submit"]:hover {
      background-color: rgb(37, 192, 195);
    }
  </style>
</head>
<body>

  <form onsubmit="goToPage(event)">
    <h2>Job Opportunities</h2>
    
    <label for="disability">Select your type of disability:</label>
    <select id="disability" name="disability" required>
      <option value="">-- Please choose --</option>
      <option value="mobility">leg impairment</option>
      <option value="hand">hand/arm impairment</option>
      <option value="speech">Speech & Hearing impairment</option>
      <option value="vision">blindness/Vision impairment</option>
    </select>
  
    <input type="submit" value="Submit" />
  </form>
  
  <script>
    function goToPage(event) {
      event.preventDefault();
      const select = document.getElementById('disability');
      const value = select.value;

      if (value === 'mobility') {
        window.location.href = 'mobility-jobs.html';
      }

      if (value === 'hand') {
        window.location.href = 'hand.html';
      }

      if (value === 'speech') {
        window.location.href = 'speech.html';
      }

      if (value === 'vision') {
        window.location.href = 'vision.html';
      }

    }
  </script>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-content">
    <a href="/finaaaaal/finaaaaal/project/reachable/public" class="logo">Reachable</a>
    <div class="search-box">
      <input type="text" placeholder="Where do you want to go today?" />
      <i class="fas fa-search search-icon"></i>
    </div>
    <div class="right-side">
      <div class="dropdown">
        <button class="dropbtn">
          Categories <i class="fas fa-chevron-down"></i>
        </button>
        <div class="dropdown-content">
          <a href="/finaaaaal/finaaaaal/project/reachable/public/hospitals">Hospitals / Clinics</a>
          <a href="/finaaaaal/finaaaaal/project/reachable/public/REST/restu.html">Restaurants / Cafes</a>
          <a href="/finaaaaal/finaaaaal/project/reachable/public/schools">Schools / Colleges</a>
          <a href="/finaaaaal/finaaaaal/project/reachable/public/malls">Shopping Malls</a>
          <a href="/finaaaaal/finaaaaal/project/reachable/public/TRANS/transport.html">Public Transport</a>
          <a href="/finaaaaal/finaaaaal/project/reachable/public/SPORTS/sports.html">Adaptive Sports</a>
          <a href="/finaaaaal/finaaaaal/project/reachable/public/job">Job Opportunities</a>
          <a href="/finaaaaal/finaaaaal/project/reachable/public/supplies">Supplies Shops</a>
        </div>
      </div>
      <a href="/finaaaaal/finaaaaal/project/reachable/public/login" class="lang-link">Login</a>
    </div>
  </div>
</nav>

</body>
</html>
